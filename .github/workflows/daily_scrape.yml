name: Daily Pakistan Market Data Scrape

on:
  schedule:
    # Runs at 12:00 UTC every day (5:00 PM PKT)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI for testing

jobs:
  run-data-pipelines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate Google Cloud via Secret
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" > bq-key.json
          
      - name: Run Market Pipeline
        run: python market_pipeline.py

      - name: Run MUFAP Pipeline
        run: python mufap_pipeline.py
